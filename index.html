<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupon World Admin Generator</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#05070b;color:white;padding:24px}
.wrap{max-width:900px;margin:auto}
h1{color:#ffd43b}
label{display:block;color:#ffd43b;font-weight:bold;margin-top:14px}
textarea,input,select{
  width:100%;box-sizing:border-box;padding:14px;border-radius:10px;
  border:1px solid #333;background:#101820;color:#fff;margin-top:7px
}
button{
  margin-top:16px;margin-right:8px;padding:13px 18px;border:0;border-radius:10px;
  background:linear-gradient(135deg,#ff8a00,#ffd43b);font-weight:bold;cursor:pointer
}
pre{background:#101820;border:1px solid #333;padding:16px;border-radius:12px;white-space:pre-wrap;overflow:auto}
</style>
</head>
<body>

<div class="wrap">
  <h1>Coupon World Admin Generator</h1>
  <p>Paste Amazon URL and generate clean affiliate JSON.</p>

  <label>Amazon Product URL</label>
  <textarea id="urlInput" rows="4">https://www.amazon.in/dp/B0B6NSDR2H</textarea>

  <label>Next ID</label>
  <input id="idInput" type="number" value="74">

  <label>Category</label>
  <select id="categoryInput">
    <option>Fitness</option>
    <option>Electronics</option>
    <option>Mobiles</option>
    <option>Fashion</option>
    <option>Home</option>
    <option>Kitchen</option>
    <option>Toys</option>
    <option>Beauty</option>
    <option>Office Supplies</option>
  </select>

  <label>Product Title</label>
  <input id="titleInput" value="Adjustable Doorway Pull-Up Bar">

  <label>Description</label>
  <input id="descInput" placeholder="Short product description">

  <button type="button" onclick="generateJSON()">Generate JSON</button>
  <button type="button" onclick="copyJSON()">Copy JSON</button>
  <button type="button" onclick="clearAll()">Clear</button>

  <h2>Output</h2>
  <pre id="output">JSON will appear here...</pre>
</div>

<script>
var AFFILIATE_TAG = "guru0906-21";

function extractASIN(url) {
  var patterns = [
    /\/dp\/([A-Z0-9]{10})/i,
    /\/gp\/product\/([A-Z0-9]{10})/i,
    /pd_rd_i=([A-Z0-9]{10})/i,
    /asin=([A-Z0-9]{10})/i
  ];

  for (var i = 0; i < patterns.length; i++) {
    var match = url.match(patterns[i]);
    if (match && match[1]) {
      return match[1].toUpperCase();
    }
  }

  return "";
}

function generateJSON() {
  var url = document.getElementById("urlInput").value.trim();
  var id = Number(document.getElementById("idInput").value || 1);
  var category = document.getElementById("categoryInput").value;
  var title = document.getElementById("titleInput").value.trim();
  var description = document.getElementById("descInput").value.trim();

  var asin = extractASIN(url);

  if (!asin) {
    document.getElementById("output").textContent = "ASIN not found. Please paste a valid Amazon product URL.";
    return;
  }

  if (!title) {
    document.getElementById("output").textContent = "Please enter product title.";
    return;
  }

  var cleanLink = "https://www.amazon.in/dp/" + asin + "?tag=" + AFFILIATE_TAG;
  var image = "https://ws-in.amazon-adsystem.com/widgets/q?_encoding=UTF8&ASIN=" + asin + "&Format=_SL500_&ID=AsinImage&MarketPlace=IN&ServiceVersion=20070822&WS=1&tag=" + AFFILIATE_TAG;

  var deal = {
    id: id,
    store: "Amazon IN",
    category: category,
    title: title,
    discount: "Deal Price",
    code: "NO CODE NEEDED",
    link: cleanLink,
    expiry: "Limited Time",
    price: null,
    mrp: null,
    save: null,
    priceText: "Check live price on Amazon",
    badge: null,
    linkType: "product",
    asin: asin,
    image: image,
    description: description || "Check latest price and offer on Amazon before buying."
  };

  document.getElementById("output").textContent = JSON.stringify(deal, null, 2);
}

function copyJSON() {
  var text = document.getElementById("output").textContent;
  navigator.clipboard.writeText(text).then(function(){
    alert("JSON copied");
  });
}

function clearAll() {
  document.getElementById("urlInput").value = "";
  document.getElementById("titleInput").value = "";
  document.getElementById("descInput").value = "";
  document.getElementById("output").textContent = "JSON will appear here...";
}
</script>

</body>
</html>
