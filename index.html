<script>
const AMAZON_TAG = 'tag=guru0906-21';
const AMAZON_FALLBACK = 'https://www.amazon.in?' + AMAZON_TAG;

// FIX #6: trimmed down to the site's finalized 8 categories
const CATEGORY_ORDER = [
  'Electronics','Mobiles','Fashion','Beauty',
  'Home','Tools & Hardware','Footwear','Shopping'
];

const STORE_EMOJI = {
  'Amazon IN':'🛒','Flipkart':'🛍️','Myntra':'👗','Snapdeal':'💥',
  'Meesho':'🎀','Nykaa':'💄','Ajio':'👔','Croma':'📺','Boat':'🎧','TataCliq':'🏷️'
};

const BADGE_RULES = [
  { keys:['lightning'], cls:'badge-lightning', label:'⚡ Lightning Deal' },
  { keys:['bestseller'], cls:'badge-bestseller', label:'🏆 Bestseller' },
  { keys:['choice'], cls:'badge-choice', label:'✅ Amazon Choice' },
  { keys:['trending'], cls:'badge-trending', label:'📈 Trending' },
  { keys:['price drop','pricedrop'], cls:'badge-pricedrop', label:'📉 Price Drop' },
  { keys:['coupon','prime deal'], cls:'badge-coupon', label:'🏷️ Coupon Deal' },
  { keys:['hot'], cls:'badge-hot', label:'🔥 Hot Deal' },
  { keys:['new'], cls:'badge-new', label:'🆕 New' },
  { keys:['deal price','deal'], cls:'badge-deal', label:'🔖 Deal Price' }
];

// FIX: recognizes real Amazon domains only (used by resolveLink guard below)
const AMAZON_DOMAIN_REGEX = /(^|\.)amazon\.[a-z.]+$|(^|\.)amzn\.(in|to)$/i;

let allCoupons = [];
let activeFilter = 'all';
let searchQuery = '';

// FIX #7: basic HTML escaping for any text interpolated into innerHTML
function escapeHtml(v) {
  return String(v || '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function cleanText(v) {
  return String(v || '')
    .replace(/【entity-[^】]+】/g, 'Amazon')
    .replace(/^UPDATE:\s*/i, '')
    .trim();
}

function cleanStore(v) {
  const s = cleanText(v).replace(/\s+/g, ' ').trim();
  if (!s || s.toLowerCase().includes('amazon')) return 'Amazon IN';
  return s;
}

function cleanCategory(v) {
  const c = cleanText(v);
  if (!c) return 'Shopping';
  return c.replace(/^Prime Deal\s*-\s*/i, '').trim() || 'Shopping';
}

function slug(v) {
  return cleanText(v).toLowerCase();
}

function resolveId(c, index) {
  return c.id || c.sl_no || index + 1;
}

// FIX #2: only append the Amazon Associates tag to actual Amazon domains
function resolveLink(c) {
  let link = String(c.link || '').trim();
  if (!link) return AMAZON_FALLBACK;

  let hostname = '';
  try {
    hostname = new URL(link).hostname;
  } catch (e) {
    return link; // malformed URL, leave as-is rather than mutate it
  }

  const isAmazonLink = AMAZON_DOMAIN_REGEX.test(hostname);
  if (isAmazonLink && !link.includes('tag=')) {
    link += link.includes('?') ? '&' + AMAZON_TAG : '?' + AMAZON_TAG;
  }
  return link;
}

function getBadges(discount, badge) {
  const hay = (cleanText(discount) + ' ' + cleanText(badge)).toLowerCase();
  return BADGE_RULES.filter(r => r.keys.some(k => hay.includes(k)));
}

function formatNum(n) {
  if (n === null || n === undefined || n === '') return '';
  const num = Number(String(n).replace(/[^\d.]/g, ''));
  return Number.isFinite(num) ? num.toLocaleString('en-IN') : '';
}

function discountPercent(str) {
  const m = String(str || '').match(/(\d+)\s*%/);
  return m ? parseInt(m[1], 10) : 0;
}

function amazonImage(link) {
  const m = String(link || '').match(/\/dp\/([A-Z0-9]{10})/i);
  if (!m) return '';
  return `https://ws-in.amazon-adsystem.com/widgets/q?_encoding=UTF8&ASIN=${m[1].toUpperCase()}&Format=_SL250_&ID=AsinImage&MarketPlace=IN&ServiceVersion=20070822&WS=1&tag=guru0906-21`;
}

function expiryInfo(expStr) {
  const exp = cleanText(expStr);
  if (!exp || exp === '—' || exp.toLowerCase().includes('limited') || exp.toLowerCase() === 'no expiry') {
    return { text:'⏳ Limited Time', cls:'warning', days:999 };
  }

  const d = new Date(exp.replace(/(\d{2}) (\w{3}) (\d{4})/, '$2 $1, $3'));
  if (isNaN(d)) return { text:'📅 ' + exp, cls:'', days:999 };

  const diff = Math.ceil((d - Date.now()) / 86400000);
  if (diff < 0) return { text:'❌ Expired', cls:'urgent', days:-1 };
  if (diff === 0) return { text:'⚠️ Ends Today', cls:'urgent', days:0 };
  if (diff === 1) return { text:'⚠️ Ends Tomorrow', cls:'urgent', days:1 };
  if (diff <= 3) return { text:`🔥 Ends in ${diff}d`, cls:'urgent', days:diff };
  if (diff <= 7) return { text:`⏰ Ends in ${diff}d`, cls:'warning', days:diff };
  return { text:'📅 Ends ' + exp, cls:'', days:diff };
}

function normalizeCoupon(c, index) {
  const link = resolveLink(c);
  const store = cleanStore(c.store);
  const category = cleanCategory(c.category);
  const title = cleanText(c.title);
  const discount = cleanText(c.discount);
  const badge = cleanText(c.badge);
  const price = c.price || null;
  const mrp = c.mrp || null;
  const save = c.save || (mrp && price ? Number(mrp) - Number(price) : null);

  return {
    id: resolveId(c, index),
    store,
    emoji: STORE_EMOJI[store] || '🛒',
    category,
    categoryKey: slug(category),
    title,
    discount,
    discPct: c.discount_percent || discountPercent(discount),
    mrp,
    price,
    save,
    currency: c.currency || '₹',
    badge,
    badges: getBadges(discount, badge),
    code: c.code && !/no code/i.test(c.code) ? cleanText(c.code) : '',
    image: c.image || amazonImage(link),
    link,
    expiry: c.expiry || '',
    expInfo: expiryInfo(c.expiry || '')
    // FIX #4: 'verified' field removed entirely — no longer read or rendered,
    // so a stray "verified": true in coupons.json can't resurface on the site.
  };
}

function isValidCoupon(c) {
  const title = cleanText(c.title);
  if (!title) return false;
  if (/^update$/i.test(title) || /paste/i.test(title)) return false;
  if (!c.link) return false;
  if (expiryInfo(c.expiry || '').days < 0) return false;
  return true;
}

function dedupeCoupons(list) {
  const seen = new Set();
  return list.filter(c => {
    const key = (c.link || '').split('?')[0].toLowerCase() + '|' + c.title.toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function injectStructuredData(coupons) {
  const old = document.getElementById('ld-products');
  if (old) old.remove();

  const items = coupons.slice(0, 20).map((c, i) => ({
    "@type": "ListItem",
    "position": i + 1,
    "item": {
      "@type": "Product",
      "name": c.title,
      "category": c.category,
      ...(c.image ? { "image": c.image } : {}),
      ...(c.price ? {
        "offers": {
          "@type": "Offer",
          "priceCurrency": "INR",
          "price": String(c.price).replace(/[^\d.]/g, ''),
          "availability": "https://schema.org/InStock",
          "url": c.link
        }
      } : {})
    }
  }));

  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.id = 'ld-products';
  s.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "CouponWorld - Best Amazon India Deals",
    "itemListElement": items
  });
  document.head.appendChild(s);
}

async function loadCoupons() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const res = await fetch('./coupons.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();

    allCoupons = dedupeCoupons(
      data
        .filter(isValidCoupon)
        .map(normalizeCoupon)
    );

    buildFilterTabs();
    renderCoupons();
    updateStats();
    injectStructuredData(allCoupons);
    document.getElementById('lastUpdatedText').textContent = 'Updated just now';
  } catch (e) {
    console.error(e);
    document.getElementById('couponsGrid').innerHTML =
      '<div class="empty-state"><i class="ti ti-alert-circle"></i><p>Could not load coupons.json<br><small style="opacity:.5">Keep coupons.json in same folder as index.html</small></p></div>';
  }

  btn.classList.remove('spinning');
}

function buildFilterTabs() {
  const cats = [...new Set(allCoupons.map(c => c.category))].sort((a,b) => {
    const ai = CATEGORY_ORDER.indexOf(a);
    const bi = CATEGORY_ORDER.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.localeCompare(b);
  });

  document.getElementById('filterTabs').innerHTML =
    `<button class="filter-tab active" onclick="setFilter('all',this)">All (${allCoupons.length})</button>` +
    cats.map(cat =>
      `<button class="filter-tab" onclick="setFilter('${slug(cat)}',this)">${escapeHtml(cat)}</button>`
    ).join('');
}

function setFilter(filter, el) {
  activeFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCoupons();
}

function searchCoupons() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  renderCoupons();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchCoupons();
});

document.getElementById('searchInput').addEventListener('input', () => {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  renderCoupons();
});

function getSorted(list) {
  const sort = document.getElementById('sortSelect').value;
  const arr = [...list];

  if (sort === 'discount') arr.sort((a,b) => b.discPct - a.discPct);
  if (sort === 'newest') arr.sort((a,b) => Number(b.id) - Number(a.id));
  if (sort === 'expiry') arr.sort((a,b) => a.expInfo.days - b.expInfo.days);

  return arr;
}

function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = code; }, 1500);
  });
}

function safeAttr(v) {
  return String(v || '').replace(/"/g, '&quot;');
}

function renderCard(c) {
  const imgHtml = c.image
    ? `<img src="${safeAttr(c.image)}" alt="${safeAttr(c.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';

  const placeholderStyle = c.image ? 'display:none;' : '';

  const badgeHtml = c.badges.length
    ? c.badges.slice(0,2).map(b => `<span class="deal-badge ${b.cls}">${b.label}</span>`).join('')
    : '';

  const discHtml = c.discPct > 0
    ? `<div class="img-discount-pill">${c.discPct}% OFF</div>`
    : c.discount ? `<div class="img-discount-pill">${escapeHtml(c.discount)}</div>` : '';

  let priceHtml = '';
  if (c.price && c.mrp) {
    priceHtml = `
      <div class="card-price-section">
        <div class="price-row">
          <span class="price-current">${c.currency}${formatNum(c.price)}</span>
          <span class="price-mrp">MRP ${c.currency}${formatNum(c.mrp)}</span>
        </div>
        ${c.save > 0 ? `<div class="price-save">✓ You save ${c.currency}${formatNum(c.save)}</div>` : ''}
      </div>`;
  } else if (c.discount) {
    priceHtml = `
      <div class="card-price-section">
        <div class="price-discount-text">🏷️ ${escapeHtml(c.discount)}</div>
      </div>`;
  }

  // FIX #3: removed the unverifiable "discount auto applied" claim
  const codeHtml = c.code
    ? `<div class="card-code-row">
        <i class="ti ti-tag" style="font-size:13px;color:#818cf8"></i>
        Use code: <button class="code-chip" onclick="copyCode('${safeAttr(c.code)}',this)">${escapeHtml(c.code)}</button>
       </div>`
    : `<div class="card-code-row">
        <i class="ti ti-info-circle" style="font-size:12px;color:#94a3b8"></i>
        No coupon code required
       </div>`;

  const exp = c.expInfo;

  return `
    <article class="deal-card" id="card-${c.id}" aria-label="${safeAttr(c.title)}">
      <div class="card-image-wrap">
        ${imgHtml}
        <div class="card-img-placeholder" style="${placeholderStyle}align-items:center;justify-content:center;height:100%;width:100%;">
          ${c.emoji}
        </div>
        ${badgeHtml ? `<div class="img-badge-row">${badgeHtml}</div>` : ''}
        ${discHtml}
      </div>

      <div class="card-store-row">
        <span class="store-pill"><span class="store-icon">${c.emoji}</span>${escapeHtml(c.store)}</span>
        <span class="category-tag">${escapeHtml(c.category)}</span>
      </div>

      <h3 class="card-title">${escapeHtml(c.title)}</h3>

      ${priceHtml}
      ${codeHtml}

      <div class="card-cta">
        <a class="get-deal-btn" href="${safeAttr(c.link)}" target="_blank" rel="nofollow sponsored noopener noreferrer">
          <i class="ti ti-external-link"></i>
          ${c.store === 'Amazon IN' ? 'Get Deal on Amazon' : 'Get Deal'}
        </a>
      </div>

      <div class="card-footer-row">
        <div class="expiry-label ${exp.cls}">
          <i class="ti ti-clock" style="font-size:11px"></i> ${exp.text}
        </div>
      </div>
    </article>`;
    // FIX #4: verified-tag footer element removed
}

function renderCoupons() {
  const grid = document.getElementById('couponsGrid');
  let filtered = allCoupons;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(c => c.categoryKey === activeFilter);
  }

  if (searchQuery) {
    filtered = filtered.filter(c =>
      c.title.toLowerCase().includes(searchQuery) ||
      c.store.toLowerCase().includes(searchQuery) ||
      c.category.toLowerCase().includes(searchQuery)
    );
  }

  filtered = getSorted(filtered);

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><i class="ti ti-mood-empty"></i><p>No deals found. Try a different search.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(renderCard).join('');
}

function updateStats() {
  document.getElementById('stat-total').textContent = allCoupons.length;
  // FIX #1: this now actually counts distinct stores, not categories
  document.getElementById('stat-stores').textContent = [...new Set(allCoupons.map(c => c.store))].length;

  const max = allCoupons.reduce((m,c) => Math.max(m, c.discPct), 0);
  document.getElementById('stat-maxsave').textContent = max > 0 ? max + '%' : '—';
}

loadCoupons();
</script>
