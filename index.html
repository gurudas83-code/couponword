<script>
let allCoupons = [];
let activeFilter = 'all';
let searchQuery = '';

const REFRESH_INTERVAL = 5 * 60 * 1000;

async function loadCoupons(forceRefresh) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    // तेरे खुद के coupons.json से पढ़ेगा
    const res = await fetch('./coupons.json?t=' + Date.now());
    const data = await res.json();
    
    // तेरे JSON को इस डिज़ाइन के format में बदल रहे
    allCoupons = data.map((c, i) => ({
      id: 'c' + c.id,
      store: c.store,
      emoji: c.store === 'Amazon IN' ? '📦' : c.store === 'Flipkart' ? '🛒' : c.store === 'Myntra' ? '👗' : '🛍️',
      category: c.category.toLowerCase() || 'shopping',
      discount: c.discount,
      discountNum: parseInt(c.discount.replace(/\D/g,'')) || 0,
      code: c.code,
      description: c.title,
      country: 'India',
      flag: '🇮🇳',
      expiresIn: c.expiry,
      expiringSoon: false,
      verified: true,
      uses: Math.floor(Math.random() * 9000) + 1000
    }));

    renderCoupons();
    updateStats();
    updateLastUpdated(Date.now());
  } catch(e) {
    console.log('Error loading coupons.json', e);
  }
  
  btn.classList.remove('spinning');
}

function setFilter(filter, el) {
  activeFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCoupons();
}

function searchCoupons() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  renderCoupons();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchCoupons();
});

function renderCoupons() {
  const grid = document.getElementById('couponsGrid');
  let filtered = allCoupons;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(c => c.category.includes(activeFilter));
  }
  if (searchQuery) {
    filtered = filtered.filter(c =>
      c.store.toLowerCase().includes(searchQuery) ||
      c.description.toLowerCase().includes(searchQuery) ||
      c.code.toLowerCase().includes(searchQuery)
    );
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><i class="ti ti-mood-empty" aria-hidden="true"></i><p>No coupons found.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(c => `
    <div class="coupon-card" id="card-${c.id}">
      <div class="coupon-header">
        <div class="store-info">
          <div class="store-logo">${c.emoji}</div>
          <div class="store-name">${c.store}</div>
          <div class="store-category">${c.category.charAt(0).toUpperCase()+c.category.slice(1)}</div>
        </div>
        <div class="discount-badge">${c.discount}</div>
      </div>
      <hr class="coupon-divider">
      <div class="coupon-body">
        <p class="coupon-desc">${c.description}</p>
        <div class="code-row">
          <div class="code-box" id="code-${c.id}" onclick="copyCode('${c.id}','${c.code}')">${c.code}</div>
          <button class="copy-btn" id="btn-${c.id}" onclick="copyCode('${c.id}','${c.code}')">
            <i class="ti ti-copy" aria-hidden="true"></i> Copy
          </button>
        </div>
      </div>
      <div class="coupon-footer">
        <div class="expiry">
          <i class="ti ti-clock" aria-hidden="true" style="font-size:12px"></i>
          Expires: ${c.expiresIn}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="country-flag">${c.flag}</span>
          <span class="country-label">${c.country}</span>
          ${c.verified ? '<span class="verified-badge"><i class="ti ti-circle-check" style="font-size:10px"></i>Verified</span>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function copyCode(id, code) {
  navigator.clipboard.writeText(code).catch(()=>{});
  const codeEl = document.getElementById('code-' + id);
  const btnEl = document.getElementById('btn-' + id);
  codeEl.textContent = '✓ Copied!';
  codeEl.classList.add('copied');
  btnEl.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Done';
  btnEl.classList.add('copied');
  setTimeout(() => {
    codeEl.textContent = code;
    codeEl.classList.remove('copied');
    btnEl.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Copy';
    btnEl.classList.remove('copied');
  }, 2000);
}

function updateStats() {
  document.getElementById('stat-total').textContent = allCoupons.length;
  document.getElementById('stat-stores').textContent = [...new Set(allCoupons.map(c => c.store))].length;
  document.getElementById('stat-countries').textContent = '1';
  const maxSave = allCoupons.reduce((max, c) => Math.max(max, c.discountNum || 0), 0);
  document.getElementById('stat-maxsave').textContent = maxSave > 0 ? maxSave + '%' : 'Free!';
}

function updateLastUpdated(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  const text = mins < 1 ? 'Just now' : mins < 60 ? `${mins}m ago` : `${Math.floor(mins/60)}h ago`;
  document.getElementById('lastUpdatedText').textContent = 'Updated ' + text;
}

loadCoupons(false);
setInterval(() => loadCoupons(false), REFRESH_INTERVAL);
</script>
