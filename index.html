    :root {
      --color-background-tertiary: #0a0a0a;

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, #app {

    .coupons-grid {

    .coupon-card {

<body>
  <h2 class="sr-only">Global Coupon Code Website</h2>
  
  <div id="app">
    <div class="hero">
      <div class="hero-badge">
        <i class="ti ti-sparkles" aria-hidden="true" style="font-size:12px"></i>
        AI-Powered • Auto-Updated Deals
      </div>
      <h1>Save More on<br><span>Amazon India.</span></h1>
      <p>Fresh Amazon coupon codes, refreshed automatically by AI.</p>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search stores, brands, categories..." />
        <button onclick="searchCoupons()"><i class="ti ti-search" aria-hidden="true"></i> Search</button>
      </div>
    </div>

    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Active Coupons</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-stores">—</div><div class="stat-label">Categories</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-countries">—</div><div class="stat-label">Countries</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-maxsave">—</div><div class="stat-label">Max Savings</div></div>
    </div>

    <div class="controls">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">All Deals</button>
        <button class="filter-tab" onclick="setFilter('fashion', this)">Fashion</button>
        <button class="filter-tab" onclick="setFilter('tech', this)">Tech</button>
        <button class="filter-tab" onclick="setFilter('food', this)">Food</button>
        <button class="filter-tab" onclick="setFilter('travel', this)">Travel</button>
        <button class="filter-tab" onclick="setFilter('beauty', this)">Beauty</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="last-updated"><div class="live-dot"></div><span id="lastUpdatedText">Loading...</span></div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadCoupons(true)">
          <i class="ti ti-refresh" aria-hidden="true"></i> Refresh
        </button>
      </div>
    </div>

    <div class="coupons-grid" id="couponsGrid">
      <div class="empty-state"><i class="ti ti-ticket" aria-hidden="true"></i><p>Loading deals...</p></div>
    </div>
  </div>

  <script>
    let allCoupons = [];
    let activeFilter = 'all';
    let searchQuery = '';

    // This site only displays Amazon IN coupons, since that's the only affiliate
    // program connected. Every "Get Deal" button below points to a real Amazon link,
    // so what's shown always matches where the click goes (no mismatched-store redirects).
    const AFFILIATE_STORE = 'Amazon IN';
    const AMAZON_FALLBACK_LINK = 'https://www.amazon.in';

    function resolveLink(c) {
      if (c.link && c.link.trim() !== '') return c.link;
      return AMAZON_FALLBACK_LINK;
    }

    async function loadCoupons(forceRefresh) {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');

      try {
        const res = await fetch('./coupons.json?t=' + Date.now());
        const data = await res.json();

        allCoupons = data
          .filter(c => c.store === AFFILIATE_STORE)
          .map((c, i) => ({
            id: 'c' + c.id,
            store: c.store,
            emoji: '📦',
            category: (c.category || 'shopping').toLowerCase(),
            discount: c.discount,
            discountNum: parseInt(c.discount.replace(/\D/g,'')) || 0,
            code: c.code,
            description: c.title,
            link: c.link || '',
            country: 'India',
            flag: '🇮🇳',
            expiresIn: c.expiry,
            expiringSoon: false,
            verified: true,
            uses: Math.floor(Math.random() * 9000) + 1000
          }));

        renderCoupons();
        updateStats();
        updateLastUpdated(Date.now());
      } catch(e) {
        console.log('Error:', e);
        document.getElementById('couponsGrid').innerHTML = '<div class="empty-state"><i class="ti ti-alert-circle"></i><p>Error loading coupons. Check coupons.json</p></div>';
      }
      
      btn.classList.remove('spinning');
    }

    function setFilter(filter, el) {
      activeFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderCoupons();
    }

    function searchCoupons() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase();
      renderCoupons();
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchCoupons();
    });

    function renderCoupons() {
      const grid = document.getElementById('couponsGrid');
      let filtered = allCoupons;

      if (activeFilter !== 'all') {
        filtered = filtered.filter(c => c.category.includes(activeFilter));
      }
      if (searchQuery) {
        filtered = filtered.filter(c =>
          c.store.toLowerCase().includes(searchQuery) ||
          c.description.toLowerCase().includes(searchQuery) ||
          c.code.toLowerCase().includes(searchQuery)
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="ti ti-mood-empty" aria-hidden="true"></i><p>No coupons found.</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(c => `
        <div class="coupon-card" id="card-${c.id}">
          <div class="coupon-header">
            <div class="store-info">
              <div class="store-logo">${c.emoji}</div>
              <div class="store-name">${c.store}</div>
              <div class="store-category">${c.category.charAt(0).toUpperCase()+c.category.slice(1)}</div>
            </div>
            <div class="discount-badge">${c.discount}</div>
          </div>
          <hr class="coupon-divider">
          <div class="coupon-body">
            <p class="coupon-desc">${c.description}</p>
            <div class="code-row">
              <div class="code-box" id="code-${c.id}" onclick="copyCode('${c.id}','${c.code}')">${c.code}</div>
              <button class="copy-btn" id="btn-${c.id}" onclick="copyCode('${c.id}','${c.code}')">
                <i class="ti ti-copy" aria-hidden="true"></i> Copy
              </button>
            </div>
            <a class="get-deal-btn" href="${resolveLink(c)}" target="_blank" rel="noopener noreferrer">
              <i class="ti ti-external-link" aria-hidden="true"></i> Get Deal
            </a>
          </div>
          <div class="coupon-footer">
            <div class="expiry">
              <i class="ti ti-clock" aria-hidden="true" style="font-size:12px"></i>
              Expires: ${c.expiresIn}
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="country-flag">${c.flag}</span>
              <span class="country-label">${c.country}</span>
              <span class="verified-badge"><i class="ti ti-circle-check" style="font-size:10px"></i>Verified</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function copyCode(id, code) {
      navigator.clipboard.writeText(code).catch(()=>{});
      const codeEl = document.getElementById('code-' + id);
      const btnEl = document.getElementById('btn-' + id);
      codeEl.textContent = '✓ Copied!';
      codeEl.classList.add('copied');
      btnEl.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Done';
      btnEl.classList.add('copied');
      setTimeout(() => {
        codeEl.textContent = code;
        codeEl.classList.remove('copied');
        btnEl.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Copy';
        btnEl.classList.remove('copied');
      }, 2000);
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = allCoupons.length;
      document.getElementById('stat-stores').textContent = [...new Set(allCoupons.map(c => c.category))].length;
      document.getElementById('stat-countries').textContent = '1';
      const maxSave = allCoupons.reduce((max, c) => Math.max(max, c.discountNum || 0), 0);
      document.getElementById('stat-maxsave').textContent = maxSave > 0 ? maxSave + '%' : 'Free!';
    }

    function updateLastUpdated(ts) {
      const mins = Math.floor((Date.now() - ts) / 60000);
      const text = mins < 1 ? 'Just now' : mins < 60 ? `${mins}m ago` : `${Math.floor(mins/60)}h ago`;
      document.getElementById('lastUpdatedText').textContent = 'Updated ' + text;
    }

    loadCoupons(false);
  </script>
</body>
</html>
