<script>
const AFFILIATE_TAG = "guru0906-21";

function extractASIN(url){
  const patterns = [
    /\/dp\/([A-Z0-9]{10})/i,
    /\/gp\/product\/([A-Z0-9]{10})/i,
    /pd_rd_i=([A-Z0-9]{10})/i,
    /asin=([A-Z0-9]{10})/i
  ];

  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match) return match[1].toUpperCase();
  }

  return "";
}

function generateJSON(){
  const url = document.getElementById("urlInput").value.trim();
  const id = Number(document.getElementById("idInput").value || 1);
  const category = document.getElementById("categoryInput").value;
  const title = document.getElementById("titleInput").value.trim();
  const description = document.getElementById("descInput").value.trim();

  const asin = extractASIN(url);

  if (!asin) {
    document.getElementById("output").textContent = "ASIN not found. Please paste a valid Amazon product URL.";
    return;
  }

  if (!title) {
    document.getElementById("output").textContent = "Please enter product title.";
    return;
  }

  const cleanLink = "https://www.amazon.in/dp/" + asin + "?tag=" + AFFILIATE_TAG;
  const image = "https://ws-in.amazon-adsystem.com/widgets/q?_encoding=UTF8&ASIN=" + asin + "&Format=_SL500_&ID=AsinImage&MarketPlace=IN&ServiceVersion=20070822&WS=1&tag=" + AFFILIATE_TAG;

  const deal = {
    id: id,
    store: "Amazon IN",
    category: category,
    title: title,
    discount: "Deal Price",
    code: "NO CODE NEEDED",
    link: cleanLink,
    expiry: "Limited Time",
    price: null,
    mrp: null,
    save: null,
    priceText: "Check live price on Amazon",
    badge: null,
    linkType: "product",
    asin: asin,
    image: image,
    description: description || "Check latest price and offer on Amazon before buying."
  };

  document.getElementById("output").textContent = JSON.stringify(deal, null, 2);
}

function copyJSON(){
  const text = document.getElementById("output").textContent;

  if (!text || text === "JSON will appear here...") {
    alert("Generate JSON first.");
    return;
  }

  navigator.clipboard.writeText(text)
    .then(() => alert("JSON copied."))
    .catch(() => alert("Copy failed. Please select and copy manually."));
}

function clearAll(){
  document.getElementById("urlInput").value = "";
  document.getElementById("titleInput").value = "";
  document.getElementById("descInput").value = "";
  document.getElementById("output").textContent = "JSON will appear here...";
}
</script>
